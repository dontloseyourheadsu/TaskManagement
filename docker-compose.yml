services:
  postgres:
    image: postgres:15-alpine
    container_name: taskmanagement-postgres
    environment:
      - POSTGRES_USER=taskmanager
      - POSTGRES_PASSWORD=TaskManager123!
      - POSTGRES_DB=taskmanagement
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager -d taskmanagement"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: taskmanagement-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build:
      context: ./TaskManagement.Api
      dockerfile: Dockerfile
    container_name: taskmanagement-api
    environment:
      - DATABASE_URL=postgresql://taskmanager:TaskManager123!@postgres:5432/taskmanagement
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - ROCKET_DATABASES={postgres={url="postgresql://taskmanager:TaskManager123!@postgres:5432/taskmanagement"}}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  web:
    build:
      context: ./TaskManagement.Web
      dockerfile: Dockerfile
    container_name: taskmanagement-web
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
